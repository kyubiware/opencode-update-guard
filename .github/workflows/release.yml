name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    environment: release

    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Build
        run: npm run build

      - name: Bump version
        id: bump
        run: |
          npm version ${{ github.event.inputs.bump_type }} -m "release: v%s"
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v${NEW_VERSION}" >> "$GITHUB_OUTPUT"

      - name: Commit version bump and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.bump.outputs.tag }}"

      - name: Publish to npm
        run: npm publish --provenance --access public

      - name: Push commit and tag
        run: |
          git push origin HEAD:"${{ github.ref_name }}"
          git push origin "${{ steps.bump.outputs.tag }}"

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --list 'v*' --sort=-version:refname | head -2 | tail -1)
          if [ -n "$PREV_TAG" ]; then
            LOG=$(git log "${PREV_TAG}..${{ steps.bump.outputs.tag }}" --pretty=format:"- %s (%h)")
          else
            LOG=$(git log "${{ steps.bump.outputs.tag }}" --pretty=format:"- %s (%h)")
          fi
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$LOG" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c561844dd2e27cc8bfbfda # v3
        with:
          tag_name: ${{ steps.bump.outputs.tag }}
          name: v${{ steps.bump.outputs.version }}
          body: |
            ## Changes
            ${{ steps.changelog.outputs.body }}
          draft: false
          prerelease: false
